name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  e2e:
    name: Playwright E2E (booking RPCs)
    runs-on: ubuntu-latest
    # Kept as a separate job so the slow Supabase-in-Docker boot never
    # blocks fast unit-test feedback in the `ci` job above. Failures
    # here still fail the overall CI run.
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (for `pnpm start` webServer)
        # UI specs run against `pnpm start` — dev-mode hydration is
        # too slow under CI load and framer-motion's opacity:0 initial
        # state trips Playwright's visibility check. Prod build
        # hydrates in ~100ms and matches what real users see.
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

      - name: Start local Supabase stack
        # Inbucket included for the UI auth spec; edge-runtime
        # included for the daily-notifications spec (CL-9). Studio /
        # realtime / imgproxy stay excluded — none of them are needed
        # by the test suite and dropping them shaves ~30s of Docker
        # boot.
        run: supabase start --exclude studio,realtime,imgproxy

      - name: Serve daily-notifications edge function
        # Background process: Playwright's spec polls
        # /functions/v1/daily-notifications and skips with a clear
        # diagnostic if it can't reach it. Serving it gives the spec
        # actual coverage of the cron path.
        run: |
          supabase functions serve daily-notifications --env-file <(echo "RESEND_API_KEY=re_test_dummy") &
          # Allow the function runtime ~10s to come up before the spec
          # polls it. Cheaper than the spec's 15s polling timeout.
          sleep 10

      - name: Run E2E suite
        run: pnpm e2e
        env:
          # `supabase start` prints the local URL + keys; the E2E
          # helpers fall back to the well-known local-dev defaults so
          # we don't have to capture them here.
          SUPABASE_E2E_URL: http://127.0.0.1:54321
          INBUCKET_URL: http://127.0.0.1:54324
          # Public envs for the web server Playwright auto-boots.
          # In CI the webServer runs `pnpm start` (prod build).
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

      - name: Stop Supabase (best-effort)
        if: always()
        run: supabase stop --no-backup || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
